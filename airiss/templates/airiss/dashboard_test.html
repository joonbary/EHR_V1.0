<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRISS - AI 기반 HR 지원 시스템 (독립 실행형)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'ok-orange': '#FF6B00',
                        'ok-orange-dark': '#E55A00',
                        'ok-blue': '#003E7E',
                        'ok-blue-dark': '#002D5F',
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; }
        
        /* 그라데이션 배경 애니메이션 */
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .gradient-bg {
            background: linear-gradient(-45deg, #FF6B00, #FF8533, #FF9D5C, #FFB380);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        
        /* 부드러운 스크롤 */
        html { scroll-behavior: smooth; }
        
        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #FF6B00; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #E55A00; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <!-- 메인 컨테이너 -->
    <div class="min-h-screen flex">
        <!-- 메인 콘텐츠 -->
        <main class="flex-1 p-6">
            <!-- 헤더 -->
            <div class="gradient-bg rounded-2xl p-8 mb-8 text-white shadow-xl">
                <h1 class="text-4xl font-bold mb-2">AIRISS - 독립 실행형</h1>
                <p class="text-xl opacity-90">AI 기반 HR 지원 시스템</p>
            </div>
            
            <!-- 테스트 버튼 -->
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 mb-6">
                <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-4">JavaScript 테스트</h2>
                <button onclick="alert('JavaScript가 정상적으로 작동합니다!')" class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg">
                    테스트 버튼 - 클릭해보세요
                </button>
            </div>
            
            <!-- AI 설정 카드 -->
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 mb-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold text-gray-900 dark:text-white">
                        <i class="fas fa-brain text-ok-orange mr-2"></i>AI 모델 설정
                    </h2>
                    <button id="aiSettingsBtn" class="px-4 py-2 bg-ok-orange hover:bg-ok-orange-dark text-white rounded-lg transition-all duration-200 flex items-center space-x-2">
                        <i class="fas fa-cog"></i>
                        <span>AI 설정</span>
                    </button>
                </div>
                
                <!-- AI 설정 컨텐츠 (숨김 상태) -->
                <div id="aiSettingsCard" class="hidden">
                    <div class="border-t pt-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- 모델 선택 -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                                    GPT 모델 선택
                                </label>
                                <select id="modelSelector" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-ok-orange focus:border-transparent dark:bg-gray-700 dark:text-white">
                                    <option value="">모델 선택...</option>
                                    <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                                    <option value="gpt-4">GPT-4</option>
                                    <option value="gpt-4o" selected>GPT-4 Optimized</option>
                                    <option value="gpt-4-turbo">GPT-4 Turbo</option>
                                </select>
                            </div>
                            
                            <!-- 모델 정보 -->
                            <div>
                                <div class="bg-blue-50 dark:bg-blue-900/30 rounded-lg p-4">
                                    <div class="flex items-center mb-2">
                                        <span id="apiStatus" class="w-3 h-3 rounded-full bg-green-500 mr-2"></span>
                                        <span id="apiStatusText" class="text-sm font-medium text-green-600 dark:text-green-400">OpenAI API 연결됨</span>
                                    </div>
                                    <div id="modelInfo" class="text-sm text-gray-600 dark:text-gray-400">
                                        <div class="font-medium text-gray-900 dark:text-white">GPT-4 Optimized</div>
                                        <div class="text-xs text-gray-600 dark:text-gray-400 mt-1">최적화된 GPT-4</div>
                                        <div class="flex space-x-2 mt-2">
                                            <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300">
                                                비용: 중간
                                            </span>
                                            <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300">
                                                속도: 빠름
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 새로고침 버튼 -->
                        <div class="mt-4 flex justify-end">
                            <button onclick="refreshModels()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 rounded-lg transition-colors">
                                <i class="fas fa-sync mr-2"></i>새로고침
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 통계 카드들 -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <!-- 총 AI 분석 -->
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 border-l-4 border-ok-orange">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 dark:text-gray-400 text-sm">총 AI 분석</p>
                            <p class="text-3xl font-bold text-gray-900 dark:text-white mt-1">1,248</p>
                        </div>
                        <div class="bg-orange-100 dark:bg-orange-900/30 rounded-full p-3">
                            <i class="fas fa-chart-line text-ok-orange text-xl"></i>
                        </div>
                    </div>
                </div>
                
                <!-- 활성 인사이트 -->
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 border-l-4 border-blue-500">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 dark:text-gray-400 text-sm">활성 인사이트</p>
                            <p class="text-3xl font-bold text-gray-900 dark:text-white mt-1">23</p>
                        </div>
                        <div class="bg-blue-100 dark:bg-blue-900/30 rounded-full p-3">
                            <i class="fas fa-lightbulb text-blue-500 text-xl"></i>
                        </div>
                    </div>
                </div>
                
                <!-- 챗봇 대화 -->
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 border-l-4 border-green-500">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 dark:text-gray-400 text-sm">챗봇 대화</p>
                            <p class="text-3xl font-bold text-gray-900 dark:text-white mt-1">856</p>
                        </div>
                        <div class="bg-green-100 dark:bg-green-900/30 rounded-full p-3">
                            <i class="fas fa-comments text-green-500 text-xl"></i>
                        </div>
                    </div>
                </div>
                
                <!-- 활성 대화 -->
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 border-l-4 border-purple-500">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 dark:text-gray-400 text-sm">활성 대화</p>
                            <p class="text-3xl font-bold text-gray-900 dark:text-white mt-1">12</p>
                        </div>
                        <div class="bg-purple-100 dark:bg-purple-900/30 rounded-full p-3">
                            <i class="fas fa-users text-purple-500 text-xl"></i>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 알림 컨테이너 -->
    <div id="alertContainer" class="fixed top-4 right-4 z-50"></div>
    
    <!-- JavaScript -->
    <script>
        // 즉시 실행 로그
        console.log('🎯 AIRISS 독립 실행형 JavaScript 시작');
        
        // 전역 변수
        let currentModels = [
            { id: 'gpt-3.5-turbo', name: 'GPT-3.5 Turbo', description: '빠르고 효율적인 모델', cost: '저렴', speed: '빠름' },
            { id: 'gpt-4', name: 'GPT-4', description: '가장 강력한 모델', cost: '높음', speed: '보통' },
            { id: 'gpt-4o', name: 'GPT-4 Optimized', description: '최적화된 GPT-4', cost: '중간', speed: '빠름' },
            { id: 'gpt-4-turbo', name: 'GPT-4 Turbo', description: '빠른 GPT-4', cost: '중간', speed: '매우 빠름' }
        ];
        
        // 유틸리티 함수
        function showAlert(message, type = 'success') {
            console.log(`📢 Alert: ${type} - ${message}`);
            const container = document.getElementById('alertContainer');
            const alertId = 'alert-' + Date.now();
            
            const bgColor = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle';
            
            const alertHTML = `
                <div id="${alertId}" class="${bgColor} text-white px-6 py-4 rounded-lg shadow-lg mb-4 flex items-center space-x-3 transform transition-all duration-300 translate-x-0">
                    <i class="fas ${icon}"></i>
                    <span>${message}</span>
                    <button onclick="document.getElementById('${alertId}').remove()" class="ml-auto text-white hover:text-gray-200">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', alertHTML);
            
            // 3초 후 자동 제거
            setTimeout(() => {
                const alert = document.getElementById(alertId);
                if (alert) {
                    alert.classList.add('translate-x-full', 'opacity-0');
                    setTimeout(() => alert.remove(), 300);
                }
            }, 3000);
        }
        
        // AI 설정 토글
        function toggleAISettings() {
            console.log('🔧 AI 설정 토글');
            const card = document.getElementById('aiSettingsCard');
            if (card) {
                if (card.classList.contains('hidden')) {
                    card.classList.remove('hidden');
                    showAlert('AI 설정을 열었습니다.', 'info');
                } else {
                    card.classList.add('hidden');
                    showAlert('AI 설정을 닫았습니다.', 'info');
                }
            }
        }
        
        // 모델 새로고침
        function refreshModels() {
            console.log('🔄 모델 목록 새로고침');
            showAlert('모델 목록을 새로고침했습니다.', 'success');
        }
        
        // 모델 정보 업데이트
        function updateModelInfo(modelId) {
            const model = currentModels.find(m => m.id === modelId);
            const infoDiv = document.getElementById('modelInfo');
            
            if (model) {
                infoDiv.innerHTML = `
                    <div class="font-medium text-gray-900 dark:text-white">${model.name}</div>
                    <div class="text-xs text-gray-600 dark:text-gray-400 mt-1">${model.description}</div>
                    <div class="flex space-x-2 mt-2">
                        <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300">
                            비용: ${model.cost}
                        </span>
                        <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300">
                            속도: ${model.speed}
                        </span>
                    </div>
                `;
            }
        }
        
        // 이벤트 리스너 등록
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 AIRISS 독립 실행형 초기화 시작...');
            
            // AI 설정 버튼 이벤트
            const aiSettingsBtn = document.getElementById('aiSettingsBtn');
            if (aiSettingsBtn) {
                console.log('📋 AI 설정 버튼 발견, 이벤트 리스너 등록...');
                aiSettingsBtn.addEventListener('click', toggleAISettings);
            }
            
            // 모델 선택 이벤트 리스너
            const selector = document.getElementById('modelSelector');
            if (selector) {
                console.log('📋 모델 선택기 발견, 이벤트 리스너 등록...');
                selector.addEventListener('change', function(e) {
                    console.log('🎯 모델 선택 변경 감지:', e.target.value);
                    if (e.target.value) {
                        updateModelInfo(e.target.value);
                        showAlert(`모델이 ${e.target.value}로 변경되었습니다.`, 'success');
                    }
                });
            }
            
            console.log('✅ AIRISS 독립 실행형 초기화 완료');
        });
        
        // 페이지 로드 완료 확인
        window.addEventListener('load', function() {
            console.log('✅ Window load 이벤트 발생 - AIRISS 독립 실행형');
        });
    </script>
</body>
</html>
